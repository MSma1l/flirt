<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow">
<title>$title — FLIRT</title>
<!--
  RO: Pagină legală PUBLICĂ (fără autentificare) — o deschide recenzentul App Store
  dintr-un browser, nelogat, și utilizatorul din aplicație (Setări / Paywall).
  ZERO dependențe externe: tot CSS-ul e inline, nu există fonturi sau scripturi de pe
  alte domenii. Dacă o rețea blochează domeniile terțe (firewall corporativ, cenzură,
  outage), pagina se încarcă identic. Paleta = paleta aplicației (#0D0D0F, #FF2D78).
-->
<style>
  :root {
    --bg: #0D0D0F;
    --surface: #16161A;
    --border: #26262C;
    --text: #EDEDF0;
    --muted: #9A9AA6;
    --accent: #FF2D78;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 24px 20px 64px; }
  header.brand { padding-top: 8px; }
  .logo {
    font-size: 22px; font-weight: 800; letter-spacing: 2px;
    color: var(--accent); margin: 0;
  }
  .logo span { color: var(--text); font-weight: 600; letter-spacing: 0; font-size: 14px; }
  h1 { font-size: 26px; line-height: 1.25; margin: 24px 0 6px; }
  h2 {
    font-size: 19px; margin: 34px 0 10px; padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  h3 { font-size: 16px; margin: 20px 0 6px; color: var(--accent); }
  p, li { color: var(--text); }
  ul, ol { padding-left: 22px; }
  li { margin: 6px 0; }
  a { color: var(--accent); }
  .muted { color: var(--muted); font-size: 14px; }
  /* Comutatorul de limbă: ancore simple, fără JavaScript — funcționează chiar și
     cu scripturile dezactivate. */
  nav.langs { display: flex; gap: 8px; margin: 18px 0 4px; }
  nav.langs a {
    flex: 1; text-align: center; text-decoration: none;
    padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-weight: 600; font-size: 15px;
  }
  nav.langs a:hover { border-color: var(--accent); }
  /* Caseta de avertizare — folosită pentru clauzele pe care recenzentul Apple le
     caută explicit (toleranță zero, 18+). Trebuie să sară în ochi. */
  .callout {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 16px 0;
  }
  .callout strong { color: var(--accent); }
  .badge {
    display: inline-block; margin-top: 10px;
    background: var(--accent); color: #fff;
    font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
    padding: 4px 10px; border-radius: 999px;
  }
  /* Marcaj vizibil pentru datele care AȘTEAPTĂ completare (numele operatorului).
     Nu inventăm o entitate juridică — se completează când există decizia. */
  .todo {
    background: rgba(255, 45, 120, 0.12);
    border: 1px dashed var(--accent);
    border-radius: 6px;
    padding: 1px 6px;
    font-weight: 600;
    white-space: nowrap;
  }
  code { background: var(--surface); border-radius: 4px; padding: 1px 5px; font-size: 14px; }
  footer {
    margin-top: 44px; padding-top: 18px;
    border-top: 1px solid var(--border);
    color: var(--muted); font-size: 14px;
  }
  footer a { margin-right: 14px; }
  @media (max-width: 480px) {
    .wrap { padding: 18px 16px 48px; }
    h1 { font-size: 22px; }
    h2 { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="brand">
    <p class="logo">FLIRT <span>· No Regrets</span></p>
    <nav class="langs">
      <a href="#ro">Română</a>
      <a href="#en">English</a>
    </nav>
  </header>

  $body

  <footer>
    <p>
      <a href="/legal/terms">Termeni / Terms</a>
      <a href="/legal/privacy">Confidențialitate / Privacy</a>
      <a href="/legal/support">Suport / Support</a>
    </p>
    <p>Contact: <a href="mailto:$contact_email">$contact_email</a> · FLIRT · 18+</p>
  </footer>
</div>
</body>
</html>
