# Reverse proxy pentru API-ul FastAPI.
upstream flirt_api {
    server api:8000;
}

# Rate limiting la marginea rețelei (prima linie de apărare, înainte de app).
# Cheia = IP-ul clientului. Zone separate: una generală și una strictă pt. auth.
# `rate` = cereri/secundă susținute; `burst` (în location) = vârf tolerat.
limit_req_zone $binary_remote_addr zone=flirt_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=flirt_auth:10m rate=5r/m;
limit_req_status 429;

# --------------------------------------------------------------------------- #
# RO: Redirect 80 -> 443 (TLS). Decomentează după ce montezi certificatele
# (ex. certbot / load balancer în față). EN: force HTTPS in production.
# --------------------------------------------------------------------------- #
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    # RO: În producție ascultă pe 443 cu TLS (vezi ssl_certificate mai jos).
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/flirt/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/flirt/privkey.pem;
    listen 80;
    server_name _;

    client_max_body_size 12m;   # upload foto anketă

    # Securitate de bază
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    # HSTS: forțează HTTPS în browser 2 ani, inclusiv subdomenii + preload.
    # (Are efect real doar servit peste TLS; inofensiv altfel.)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location /health {
        proxy_pass http://flirt_api/health;
        access_log off;
    }

    # Endpoint-urile de autentificare: limită strictă (anti brute-force / spam).
    location /api/v1/auth/ {
        limit_req zone=flirt_auth burst=10 nodelay;

        proxy_pass http://flirt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        limit_req zone=flirt_general burst=40 nodelay;

        proxy_pass http://flirt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
