# Reverse proxy TLS pentru FLIRT — DOUĂ nume publice, UN singur certificat:
#
#   api.flrt.md    → proxy către API-ul FastAPI (containerul `api`)
#   admin-flirt-paty.flrt.md  → build-ul static al panoului de admin (SPA React/Vite)
#
# ┌─ ACEST FIȘIER ESTE UN ȘABLON ────────────────────────────────────────────────┐
# │ `${DOMAIN}` și `${ADMIN_DOMAIN}` sunt înlocuite la pornirea containerului de  │
# │ `nginx/entrypoint.sh` (sed, listă fixă de variabile — restul de `$...` sunt   │
# │ variabile NGINX și rămân neatinse). Fișierul randat ajunge în                 │
# │ /etc/nginx/conf.d/default.conf. Domeniul NU e hardcodat nicăieri: vine din    │
# │ `.env` → docker-compose → container.                                          │
# └──────────────────────────────────────────────────────────────────────────────┘
#
# Certificatele sunt așteptate la căile FIXE de mai jos. Ajung acolo prin
# `nginx/40-ensure-cert.sh` (rulează la pornire și periodic):
#   - producție : symlink către /etc/letsencrypt/live/$DOMAIN/ (Let's Encrypt,
#                 emis automat de serviciul `certbot` pentru AMBELE nume)
#   - fallback  : certificat SELF-SIGNED generat pe loc (cu ambele nume în SAN)
# Nginx NU pornește fără certificat — de aceea scriptul garantează că există unul,
# iar stack-ul pornește din prima chiar dacă Let's Encrypt n-a emis încă nimic.

upstream flirt_api {
    server api:8000;
}

# --------------------------------------------------------------------------- #
# TLS — o singură dată, la nivel de `http`; toate serverele de mai jos moștenesc.
# --------------------------------------------------------------------------- #
ssl_certificate     /etc/nginx/certs/fullchain.pem;
ssl_certificate_key /etc/nginx/certs/privkey.pem;

# Doar TLS 1.2/1.3; cifruri moderne cu forward secrecy (ECDHE + AEAD).
# Fără RC4/3DES/CBC-SHA1 și fără TLS 1.0/1.1 (deprecate).
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;   # TLS1.3: clientul alege (recomandarea Mozilla)
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

server_tokens off;

# Rate limiting la marginea rețelei (prima linie de apărare, înainte de app).
# Cheia = IP-ul clientului. Zone separate: generală, strictă pt. auth, și una
# pentru panoul de admin (login-ul de admin e o țintă de brute-force).
# `rate` = cereri/secundă susținute; `burst` (în location) = vârf tolerat.
limit_req_zone $binary_remote_addr zone=flirt_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=flirt_auth:10m rate=5r/m;
limit_req_status 429;

# --------------------------------------------------------------------------- #
# :80 — NIMIC nu se servește în clar. Doar provocarea ACME (Let's Encrypt are
# nevoie de HTTP simplu ca să emită/reînnoiască certificatul) și redirect 301.
# Un singur server pe :80 acoperă AMBELE nume (api + admin).
# --------------------------------------------------------------------------- #
server {
    listen 80 default_server;
    server_name _;

    # HTTP-01 challenge (webroot partajat cu serviciul `certbot` din compose).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --------------------------------------------------------------------------- #
# :443 DEFAULT — orice Host care NU e unul dintre numele noastre (scanere care
# lovesc direct IP-ul, Host-header spoofing) primește 444: nginx închide conexiunea
# fără să răspundă nimic. Fără acest bloc, orice nume ar fi servit de primul server
# definit, iar API-ul ar fi accesibil pe IP-ul brut.
# --------------------------------------------------------------------------- #
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    return 444;
}

# --------------------------------------------------------------------------- #
# :443 API — api.flrt.md. Tot traficul aplicației mobile (inclusiv tokenurile
# JWT) trece pe aici.
# --------------------------------------------------------------------------- #
server {
    listen 443 ssl;
    http2 on;
    server_name ${DOMAIN};

    client_max_body_size 12m;   # upload foto anketă

    # Securitate de bază
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    # HSTS: forțează HTTPS în browser 2 ani, inclusiv subdomenii + preload.
    # Are efect real doar servit peste TLS — adică exact aici.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Liveness + readiness (/health, /health/ready). Fără access log (zgomot).
    location /health {
        proxy_pass http://flirt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Endpoint-urile de autentificare: limită strictă (anti brute-force / spam).
    # Acoperă și /api/v1/admin/auth/* dacă panoul de admin își pune login-ul acolo.
    location /api/v1/auth/ {
        limit_req zone=flirt_auth burst=10 nodelay;

        proxy_pass http://flirt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Corelarea log-urilor: dacă clientul nu trimite un request-id, îl
        # generăm aici; API-ul îl preia din antet (vezi app/core/logging.py).
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 60s;
    }

    location / {
        limit_req zone=flirt_general burst=40 nodelay;

        proxy_pass http://flirt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 60s;
    }
}

# --------------------------------------------------------------------------- #
# :443 ADMIN — admin-flirt-paty.flrt.md. Servește DOAR fișierele statice ale panoului
# (build Vite), din volumul `admin_dist` populat de serviciul `admin-build`.
#
# Panoul vorbește cu API-ul prin https://${DOMAIN} (cross-origin) — de aceea
# backend-ul are nevoie de CORS_ORIGINS=https://${ADMIN_DOMAIN}. NU proxyăm
# /api/ de aici: o singură origine pentru API înseamnă o singură suprafață de
# rate-limiting, de log-uri și de CORS.
#
# Dacă `admin/` nu există încă în repo (sau build-ul a eșuat), volumul e gol:
# nginx întoarce 404 pe acest nume, dar API-ul funcționează normal. Panoul de
# admin NU poate bloca backend-ul.
# --------------------------------------------------------------------------- #
server {
    listen 443 ssl;
    http2 on;
    server_name ${ADMIN_DOMAIN};

    root /var/www/admin;
    index index.html;

    limit_req zone=flirt_general burst=40 nodelay;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # CSP pentru un SPA Vite: scripturile sunt fișiere externe (module), stilurile
    # pot fi injectate inline de bundler. `connect-src` permite DOAR API-ul nostru.
    # Dacă panoul are nevoie de altă origine (ex. un CDN de fonturi), relaxeaz-o AICI,
    # explicit — nu global.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://${DOMAIN}; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Asset-urile Vite au hash în nume → cache agresiv, fără revalidare.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # index.html NU se cachează: altfel userul rămâne blocat pe un build vechi
    # care cere asset-uri hash-uite care nu mai există.
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    # Fallback SPA: react-router are rute pe client (/users, /reports...). Fără
    # `try_files ... /index.html`, un refresh (F5) pe o rută internă dă 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
