# Reverse proxy pentru API-ul FastAPI — TLS ACTIV (443); pe 80 doar ACME + redirect.
#
# Certificatele sunt așteptate la căile FIXE de mai jos. Ele ajung acolo prin
# `nginx/40-ensure-cert.sh` (rulează automat la pornirea containerului):
#   - producție : symlink către /etc/letsencrypt/live/$DOMAIN/ (Let's Encrypt)
#   - dev/local : certificat SELF-SIGNED generat pe loc (nu blochează dev-ul)
# Nginx NU pornește fără certificat — de aceea scriptul garantează că există unul.
upstream flirt_api {
    server api:8000;
}

# Rate limiting la marginea rețelei (prima linie de apărare, înainte de app).
# Cheia = IP-ul clientului. Zone separate: una generală și una strictă pt. auth.
# `rate` = cereri/secundă susținute; `burst` (în location) = vârf tolerat.
limit_req_zone $binary_remote_addr zone=flirt_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=flirt_auth:10m rate=5r/m;
limit_req_status 429;

# --------------------------------------------------------------------------- #
# :80 — NIMIC nu se servește în clar. Doar provocarea ACME (Let's Encrypt are
# nevoie de HTTP simplu ca să emită/reînnoiască certificatul) și redirect 301.
# --------------------------------------------------------------------------- #
server {
    listen 80;
    server_name _;
    server_tokens off;

    # HTTP-01 challenge (webroot partajat cu serviciul `certbot` din compose).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --------------------------------------------------------------------------- #
# :443 — TLS. Tot traficul aplicației (inclusiv tokenurile JWT) trece pe aici.
# --------------------------------------------------------------------------- #
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Doar TLS 1.2/1.3; cifruri moderne cu forward secrecy (ECDHE + AEAD).
    # Fără RC4/3DES/CBC-SHA1 și fără TLS 1.0/1.1 (deprecate).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;   # TLS1.3: clientul alege (recomandarea Mozilla)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 12m;   # upload foto anketă

    # Securitate de bază
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    # HSTS: forțează HTTPS în browser 2 ani, inclusiv subdomenii + preload.
    # Are efect real doar servit peste TLS — adică exact aici.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Liveness + readiness (/health, /health/ready). Fără access log (zgomot).
    location /health {
        proxy_pass http://flirt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Endpoint-urile de autentificare: limită strictă (anti brute-force / spam).
    location /api/v1/auth/ {
        limit_req zone=flirt_auth burst=10 nodelay;

        proxy_pass http://flirt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Corelarea log-urilor: dacă clientul nu trimite un request-id, îl
        # generăm aici; API-ul îl preia din antet (vezi app/core/logging.py).
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 60s;
    }

    location / {
        limit_req zone=flirt_general burst=40 nodelay;

        proxy_pass http://flirt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 60s;
    }
}
