# FLIRT — stack complet de producție.
#
#   git pull && docker compose up --build -d
#
# Atât. Un singur pas manual, O SINGURĂ DATĂ, ÎNAINTE: completezi `.env`
# (pornind de la `.env.production.example`). Restul e automat:
#   - migrațiile Alembic rulează la pornirea containerului `api` (entrypoint.sh);
#   - nginx pornește din prima, chiar fără certificat (self-signed generat pe loc);
#   - `certbot` cere singur certificatul REAL pentru api + admin, iar nginx îl preia
#     și dă reload în ≤1 minut, fără downtime;
#   - panoul de admin (folderul `admin/`, alt agent) e construit și publicat automat;
#     dacă lipsește sau build-ul lui pică, backend-ul pornește NORMAL.
#
# Servicii publice: DOAR nginx (80/443). Postgres și Redis NU au `ports:` — trăiesc
# exclusiv în rețeaua internă Docker. Vezi comentariile de la fiecare.
#
# Variabilele ${...} se citesc din `.env`. Nimic hardcodat.

# Rotația log-urilor: fără ea, log-urile JSON umplu discul în tăcere, iar când
# discul e plin cade Postgres (adică tot produsul). 10 MB × 5 fișiere / serviciu.
# Numele proiectului, EXPLICIT. Implicit, docker compose îl deduce din numele
# folderului — adică „backend", care e cel mai banal nume posibil. Pe un server cu
# mai multe aplicații, două proiecte cu un folder `backend/` s-ar amesteca: `docker
# compose ps` ar arăta containerele altcuiva, iar un `down` ar putea opri altă
# aplicație. Cu numele fixat, izolarea e garantată.
name: flirt

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    security_opt: [ "no-new-privileges:true" ]
    # ⚠️  FĂRĂ `ports:`. Un Postgres publicat pe host (0.0.0.0:5432) e scanat și
    # atacat în minute. `api`, `purge` și `backup` îl ating prin numele de serviciu
    # `db` în rețeaua internă Docker — nu are nevoie de niciun port pe host.
    # Ai nevoie de psql de pe laptop? Tunel SSH:
    #   ssh -L 5432:localhost:5432 user@server  +  docker compose exec db psql -U flirt
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flirt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-flirt}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flirt}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    security_opt: [ "no-new-privileges:true" ]
    # ⚠️  FĂRĂ `ports:`. Un Redis expus pe internet e preluat în minute (nu are
    # autentificare implicită, iar comenzile CONFIG SET / MODULE LOAD duc direct la
    # execuție de cod pe server). Rămâne în rețeaua internă Docker.
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    logging: *default-logging
    security_opt: [ "no-new-privileges:true" ]
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      # Rate limiting PARTAJAT între workeri/instanțe (app/core/ratelimit.py) +
      # store OTP live. Fără Redis, limita e per proces × 4 workeri.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # `expose` = documentație + rețeaua internă. NU publică nimic pe host: singurul
    # drum către API din exterior trece prin nginx (TLS + rate limiting).
    expose:
      - "8000"
    # Readiness REAL (SELECT 1 pe DB + PING pe Redis) — nu un 200 static.
    # `start_period` acoperă migrațiile Alembic din entrypoint.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  # Construiește panoul de admin (`admin/`, React+Vite) și îl publică în volumul
  # `admin_dist`, de unde nginx îl servește ca fișiere statice pe ${ADMIN_DOMAIN}.
  #
  # Rulează O DATĂ, apoi iese (`restart: "no"`). Sursa e montată READ-ONLY: nu
  # atingem folderul altui agent. Scriptul iese ÎNTOTDEAUNA cu 0 și nginx NU
  # depinde de el ⇒ un panou de admin lipsă sau un build stricat nu pot ține
  # backend-ul jos. Detalii: scripts/build_admin.sh
  admin-build:
    image: node:20-alpine
    restart: "no"
    logging: *default-logging
    security_opt: [ "no-new-privileges:true" ]
    working_dir: /tmp
    environment:
      ADMIN_SRC: /src/admin
      ADMIN_OUT: /dist
      ADMIN_BUILD_DIR: ${ADMIN_BUILD_DIR:-dist}
      # Panoul are nevoie de URL-ul API-ului la BUILD (Vite inline-uiește VITE_*).
      # Dacă VITE_API_URL nu e setat în .env, scriptul îl compune din DOMAIN.
      VITE_API_URL: ${VITE_API_URL:-}
      DOMAIN: ${DOMAIN:-localhost}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
    volumes:
      # Rădăcina repo-ului, READ-ONLY. Montăm repo-ul, nu `../admin`, tocmai ca
      # Docker să NU creeze un folder `admin/` gol pe host când acesta lipsește.
      - ../:/src:ro
      - admin_dist:/dist
      - ./scripts/build_admin.sh:/build_admin.sh:ro
    command: ["/bin/sh", "/build_admin.sh"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    logging: *default-logging
    security_opt: [ "no-new-privileges:true" ]
    environment:
      # Numele publice. Decid `server_name` din config (randat la pornire) ȘI ce
      # certificat caută nginx în /etc/letsencrypt. Zero hardcodare.
      DOMAIN: ${DOMAIN:-localhost}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.localhost}
    ports:
      - "80:80"     # doar ACME + redirect 301 către HTTPS
      - "443:443"   # tot traficul real (api + admin)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/entrypoint.sh:/usr/local/bin/nginx-entrypoint.sh:ro
      - ./nginx/40-ensure-cert.sh:/usr/local/bin/ensure-cert.sh:ro
      - letsencrypt:/etc/letsencrypt          # certificate emise de certbot
      - certbot_www:/var/www/certbot          # webroot pentru HTTP-01
      - nginx_certs:/etc/nginx/certs          # certificatul activ (LE sau self-signed)
      - admin_dist:/var/www/admin:ro          # build-ul panoului de admin
    # Randează configul (${DOMAIN}) → asigură un certificat → `nginx -t` → pornește
    # → supraveghează certificatul și dă reload când certbot îl emite/reînnoiește.
    command: ["/bin/sh", "/usr/local/bin/nginx-entrypoint.sh"]
    depends_on:
      - api

  # Emite ȘI reînnoiește certificatul Let's Encrypt pentru AMBELE nume
  # (${DOMAIN} + ${ADMIN_DOMAIN}), complet automat — vezi scripts/certbot_entrypoint.sh.
  # Nu există „comanda de emitere inițială" de rulat manual.
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    logging: *default-logging
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-false}
      CERTBOT_INTERVAL_SECONDS: ${CERTBOT_INTERVAL_SECONDS:-43200}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ./scripts/certbot_entrypoint.sh:/certbot_entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/certbot_entrypoint.sh"]
    depends_on:
      - nginx

  # Purjare GDPR: șterge definitiv conturile a căror perioadă de grație a expirat.
  # Serviciu SEPARAT, o singură instanță — dacă ar rula în lifespan-ul API-ului,
  # s-ar executa de 4 ori (câți workeri gunicorn are entrypoint.sh).
  purge:
    build: .
    restart: unless-stopped
    logging: *default-logging
    security_opt: [ "no-new-privileges:true" ]
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      GDPR_PURGE_INTERVAL_SECONDS: ${GDPR_PURGE_INTERVAL_SECONDS:-3600}
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "scripts/gdpr_purge.py", "--loop"]

  # Backup periodic (pg_dump comprimat) + retenție. Restore: vezi DEPLOYMENT.md.
  # Un backup NETESTAT nu e backup — `scripts/restore_db.sh` e procedura testabilă.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    security_opt: [ "no-new-privileges:true" ]
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-flirt}
      PGPASSWORD: ${POSTGRES_PASSWORD:-change_me}
      PGDATABASE: ${POSTGRES_DB:-flirt}
      POSTGRES_DB: ${POSTGRES_DB:-flirt}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./scripts:/scripts:ro
      - ${BACKUP_HOST_DIR:-./backups}:/backups
    depends_on:
      db:
        condition: service_healthy
    command: ["/bin/sh", "/scripts/backup_db.sh", "--loop"]

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  certbot_www:
  nginx_certs:
  admin_dist:
